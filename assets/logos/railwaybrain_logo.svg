             C255 120 255 150 238 163 C245 190 220 210 195 203
             C185 220 155 220 145 203 C115 210 90 185 98 157
             C82 143 82 120 100 105 Z"/>
    <path d="M150 57 C150 95 150 135 150 175"/>
    <path d="M180 63 C178 100 182 140 178 195"/>
    <path d="M112 113 C130 117 132 135 118 143 C132 151 132 169 116 175"/>
    <path d="M215 95 C198 103 198 123 214 129 C198 137 198 157 216 165"/>
  </g>

  <!-- AI circuit nodes -->
  <g fill="url(#blueGrad)">
    <circle cx="150" cy="57" r="4.5"/>
    <circle cx="180" cy="63" r="4.5"/>
    <circle cx="112" cy="113" r="4.5"/>
    <circle cx="215" cy="95" r="4.5"/>
    <circle cx="150" cy="175" r="4.5"/>
    <circle cx="178" cy="195" r="4.5"/>
