      <stop offset="0%" stop-color="#0d1730"/>
      <stop offset="100%" stop-color="#16223f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a4d"/>
      <stop offset="100%" stop-color="#ea580c"/>
